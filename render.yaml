services:
  - type: web
    name: nonstop-v2-1-16
    runtime: node
    buildCommand: corepack enable && corepack prepare yarn@1.22.22 --activate && yarn install --network-timeout 600000 && yarn build
    startCommand: yarn start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
